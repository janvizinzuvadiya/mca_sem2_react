<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" >

      class car
      {       
        constructor(name)
        {
          this.brand = name;
        }
          
        present()
        {
          console.log('Brande Name: '+ this.brand);            
        }
          
      }
      class model extends car
      {
        constructor(name,mod)
        {
          super(name);
          this.model = mod;
        }

        show()
        {
          this.present();
          console.log( 'and Model is: '+this.model);
        }

      }

      const mycar= new model('Hyundai','Exter');
      mycar.show();


    </script>
  </body>
</html>
